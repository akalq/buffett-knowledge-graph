<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识树 | 巴菲特知识库</title>
    <style>
        :root {
            --bg-color: #FFFEF9;
            --navy: #1B2A4A;
            --gold: #C9A227;
            --text: #2C3E50;
            --secondary: #5D6D7E;
            --border: #E5E0D8;
            --card-bg: #FFFFFF;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Noto Serif SC', 'Georgia', serif;
            background: var(--bg-color);
            color: var(--text);
            line-height: 1.8;
            min-height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 60px;
            background: var(--navy);
            z-index: 1000;
            transition: width 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .sidebar.expanded {
            width: 220px;
        }
        
        .sidebar-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 60px;
            background: transparent;
            border: none;
            color: var(--gold);
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .sidebar-toggle:hover {
            background: rgba(201, 162, 39, 0.2);
        }
        
        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: white;
            text-decoration: none;
            font-size: 0.95em;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
        }
        
        .nav-item .icon {
            font-size: 1.3em;
            width: 30px;
            flex-shrink: 0;
            text-align: center;
        }
        
        .nav-item .label {
            opacity: 0;
            margin-left: 12px;
            transition: opacity 0.2s;
        }
        
        .sidebar.expanded .nav-item .label {
            opacity: 1;
        }
        
        .nav-item:hover {
            background: rgba(201, 162, 39, 0.15);
            color: var(--gold);
        }
        
        /* Main Content Wrapper */
        .main-wrapper {
            margin-left: 60px;
            transition: margin-left 0.3s ease;
            min-height: 100vh;
        }
        
        .main-wrapper.sidebar-expanded {
            margin-left: 220px;
        }
        
        /* Header */
        .header {
            background: var(--navy);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-title h1 {
            font-size: 1.6em;
            font-weight: 600;
        }
        
        .header-title .icon {
            font-size: 1.8em;
            color: var(--gold);
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            padding: 8px 20px;
            border: 1px solid rgba(201, 162, 39, 0.5);
            background: transparent;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            background: var(--gold);
            color: var(--navy);
            border-color: var(--gold);
        }
        
        /* Tree Container */
        .tree-container {
            padding: 30px;
        }
        
        .tree-card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(27, 42, 74, 0.08);
            overflow: hidden;
        }
        
        .tree-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .tree-title {
            font-size: 1.2em;
            color: var(--navy);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .tree-stats {
            display: flex;
            gap: 20px;
            font-size: 0.9em;
            color: var(--secondary);
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .stat-num {
            font-weight: bold;
            color: var(--gold);
        }
        
        .tree-content {
            padding: 30px;
            overflow-x: auto;
        }
        
        /* Tree Styles */
        .knowledge-tree {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: fit-content;
        }
        
        .tree-root {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .root-node {
            background: linear-gradient(135deg, var(--gold) 0%, #d4af37 100%);
            color: var(--navy);
            padding: 20px 35px;
            border-radius: 50px;
            font-size: 1.3em;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(201, 162, 39, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .tree-branches {
            display: flex;
            gap: 25px;
            position: relative;
            padding-top: 30px;
        }
        
        .tree-branches::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 2px;
            background: var(--border);
        }
        
        .branch {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        
        .branch::before {
            content: '';
            position: absolute;
            top: -30px;
            left: 50%;
            width: 2px;
            height: 30px;
            background: var(--border);
        }
        
        .branch-node {
            background: var(--navy);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 3px 10px rgba(27, 42, 74, 0.2);
        }
        
        .branch-node:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(27, 42, 74, 0.3);
        }
        
        .branch-node .toggle-icon {
            font-size: 0.8em;
            transition: transform 0.3s;
        }
        
        .branch.collapsed .toggle-icon {
            transform: rotate(-90deg);
        }
        
        .branch-children {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow: hidden;
            transition: all 0.4s ease;
            max-height: 2000px;
            opacity: 1;
        }
        
        .branch.collapsed .branch-children {
            max-height: 0;
            margin-top: 0;
            opacity: 0;
        }
        
        .branch-children::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            width: 2px;
            height: 10px;
            background: var(--border);
        }
        
        .child-wrapper {
            position: relative;
            padding-top: 10px;
        }
        
        .child-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 10px;
            background: var(--border);
        }
        
        .child-wrapper:first-child::before {
            display: none;
        }
        
        .child-wrapper:last-child::before {
            height: 50%;
        }
        
        .child-wrapper:only-child::before {
            display: none;
        }
        
        .child-node {
            background: white;
            border: 2px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 140px;
            justify-content: center;
        }
        
        .child-node:hover {
            border-color: var(--gold);
            background: rgba(201, 162, 39, 0.1);
            transform: translateY(-2px);
        }
        
        .child-node.has-children {
            background: #f8f7f2;
            font-weight: 500;
        }
        
        .child-node.has-children .toggle-icon {
            font-size: 0.8em;
            transition: transform 0.3s;
        }
        
        .child-wrapper.collapsed .toggle-icon {
            transform: rotate(-90deg);
        }
        
        .grandchildren {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-left: 20px;
            border-left: 2px solid var(--border);
            overflow: hidden;
            transition: all 0.3s ease;
            max-height: 500px;
        }
        
        .child-wrapper.collapsed .grandchildren {
            max-height: 0;
            margin-top: 0;
            opacity: 0;
        }
        
        .grandchild {
            background: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .grandchild:hover {
            border-color: var(--gold);
            background: rgba(201, 162, 39, 0.1);
            transform: translateX(3px);
        }
        
        .grandchild .tag {
            background: var(--gold);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7em;
            margin-left: auto;
        }
        
        /* Legend */
        .legend {
            padding: 20px 25px;
            border-top: 1px solid var(--border);
            background: #faf9f5;
        }
        
        .legend-title {
            font-size: 0.9em;
            color: var(--secondary);
            margin-bottom: 12px;
        }
        
        .legend-items {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .legend-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85em;
        }
        
        .legend-sample {
            padding: 6px 15px;
            border-radius: 8px;
        }
        
        .legend-sample.root {
            background: var(--gold);
            color: var(--navy);
        }
        
        .legend-sample.branch {
            background: var(--navy);
            color: white;
        }
        
        .legend-sample.child {
            background: white;
            border: 2px solid var(--border);
            color: var(--text);
        }
        
        /* Instructions */
        .instructions {
            padding: 15px 25px;
            background: rgba(201, 162, 39, 0.1);
            border-top: 1px solid var(--border);
            font-size: 0.85em;
            color: var(--secondary);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .instruction-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .instruction-key {
            background: var(--navy);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8em;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 0;
            }
            
            .sidebar.expanded {
                width: 180px;
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .header {
                padding: 15px 20px;
            }
            
            .header-title h1 {
                font-size: 1.3em;
            }
            
            .tree-branches {
                flex-direction: column;
                gap: 30px;
            }
            
            .tree-branches::before {
                display: none;
            }
            
            .tree-container {
                padding: 15px;
            }
        }
    
        header { background: var(--navy); color: white; padding: 15px 0; position: sticky; top: 0; z-index: 100; }
        header .container { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.1em; font-weight: bold; color: var(--gold); text-decoration: none; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-size: 0.9em; opacity: 0.9; transition: opacity 0.2s; }
        nav a:hover { opacity: 1; color: var(--gold); }


        /* Wisdom Module */
        .wisdom-module {
            border-top: 1px solid rgba(201, 162, 39, 0.3);
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
            max-height: 200px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .wisdom-title {
            color: #C9A227;
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .sidebar.expanded .wisdom-title {
            opacity: 1;
        }
        
        .wisdom-content {
            flex: 1;
            overflow: hidden;
        }
        
        .wisdom-quote {
            color: white;
            font-size: 0.85em;
            line-height: 1.6;
            margin-bottom: 8px;
            opacity: 0;
            transition: opacity 0.2s;
            font-style: italic;
        }
        
        .sidebar.expanded .wisdom-quote {
            opacity: 1;
        }
        
        .wisdom-source {
            color: #C9A227;
            font-size: 0.8em;
            text-decoration: none;
            opacity: 0;
            transition: opacity 0.2s;
            display: block;
            cursor: pointer;
        }
        
        .sidebar.expanded .wisdom-source {
            opacity: 1;
        }
        
        .wisdom-source:hover {
            text-decoration: underline;
        }
        
        .wisdom-refresh {
            color: white;
            background: rgba(201, 162, 39, 0.2);
            border: 1px solid rgba(201, 162, 39, 0.4);
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.75em;
            cursor: pointer;
            margin-top: 10px;
            opacity: 0;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .sidebar.expanded .wisdom-refresh {
            opacity: 1;
        }
        
        .wisdom-refresh:hover {
            background: rgba(201, 162, 39, 0.4);
        }
        
        /* Mobile sidebar - 确保wisdom模块正确显示 */
        @media (max-width: 900px) {
            .sidebar {
                transform: translateX(-100%);
                width: 220px;
                transition: transform 0.3s ease;
            }
            .sidebar.mobile-open {
                transform: translateX(0);
            }
            .sidebar .nav-item .label,
            .sidebar .wisdom-title,
            .sidebar .wisdom-quote,
            .sidebar .wisdom-source,
            .sidebar .wisdom-refresh {
                opacity: 1;
            }
        }
    </style>
</head>

        // Render Tree
        function renderTree() {
            const container = document.getElementById('knowledge-tree');
            container.innerHTML = '';
            
            // Root
            const rootDiv = document.createElement('div');
            rootDiv.className = 'tree-root';
            rootDiv.innerHTML = `
                <div class="root-node">
                    <span>${knowledgeTree.icon}</span>
                    <span>${knowledgeTree.name}</span>
                </div>
            `;
            container.appendChild(rootDiv);
            
            // Branches
            const branchesDiv = document.createElement('div');
            branchesDiv.className = 'tree-branches';
            
            knowledgeTree.children.forEach((branch, index) => {
                const branchDiv = createBranchElement(branch);
                branchesDiv.appendChild(branchDiv);
            });
            
            container.appendChild(branchesDiv);
        }
        
        function createBranchElement(branch) {
            const branchDiv = document.createElement('div');
            branchDiv.className = 'branch';
            
            const hasChildren = branch.children && branch.children.length > 0;
            
            branchDiv.innerHTML = `
                <div class="branch-node" onclick="toggleBranch(this)">
                    <span>${branch.icon}</span>
                    <span>${branch.name}</span>
                    ${hasChildren ? '<span class="toggle-icon">▼</span>' : ''}
                </div>
                <div class="branch-children">
                    ${branch.children ? branch.children.map(child => createChildHTML(child)).join('') : ''}
                </div>
            `;
            
            return branchDiv;
        }
        
        function createChildHTML(child) {
            const hasGrandchildren = child.children && child.children.length > 0;
            const isLink = child.link && !hasGrandchildren;
            
            let html = '';
            
            if (hasGrandchildren) {
                html = `
                    <div class="child-wrapper">
                        <div class="child-node has-children" onclick="toggleGrandchildren(this)">
                            <span>${child.icon || '📁'}</span>
                            <span>${child.name}</span>
                            <span class="toggle-icon">▼</span>
                        </div>
                        <div class="grandchildren">
                            ${child.children.map(gc => `
                                <a href="${gc.link}" class="grandchild">
                                    <span>${gc.icon || '📄'}</span>
                                    <span>${gc.name}</span>
                                    ${gc.tag ? `<span class="tag">${gc.tag}</span>` : ''}
                                </a>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (child.link) {
                html = `
                    <div class="child-wrapper">
                        <a href="${child.link}" class="child-node">
                            <span>${child.icon || '📄'}</span>
                            <span>${child.name}</span>
                            ${child.tag ? `<span class="tag">${child.tag}</span>` : ''}
                        </a>
                    </div>
                `;
            } else {
                html = `
                    <div class="child-wrapper">
                        <div class="child-node">
                            <span>${child.icon || '📄'}</span>
                            <span>${child.name}</span>
                        </div>
                    </div>
                `;
            }
            
            return html;
        }
        
        function toggleBranch(element) {
            const branch = element.closest('.branch');
            if (branch) {
                branch.classList.toggle('collapsed');
            }
        }
        
        function toggleGrandchildren(element) {
            const wrapper = element.closest('.child-wrapper');
            if (wrapper) {
                wrapper.classList.toggle('collapsed');
            }
        }
        
        function expandAll() {
            document.querySelectorAll('.branch').forEach(b => b.classList.remove('collapsed'));
            document.querySelectorAll('.child-wrapper').forEach(w => w.classList.remove('collapsed'));
        }
        
        function collapseAll() {
            document.querySelectorAll('.branch').forEach(b => b.classList.add('collapsed'));
            document.querySelectorAll('.child-wrapper').forEach(w => w.classList.add('collapsed'));
        }
