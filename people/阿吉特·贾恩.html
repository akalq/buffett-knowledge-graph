            <h2>人物简介</h2>
            <p>阿吉特·贾恩（Ajit Jain）是伯克希尔帝国中最重要的高管之一，负责管理伯克希尔的保险和再保险业务。1985年加入伯克希尔后，他迅速成为巴菲特最信任的保险业务管理者之一。</p>
